services:
  backend:
    build:
      context: ./backend
    container_name: atm-media-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/atm_media.db
      JWT_SECRET_KEY: replace-with-a-long-random-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: replace-this-password
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - backend_data:/data

volumes:
  backend_data:

